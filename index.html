<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Watch Video</title>

<style>
body {
  margin: 0;
  background: black;
}

.wrap {
  position: relative;
  width: 100%;
  height: 100vh;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* 透明点击层 */
.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="wrap">
  <iframe src="https://streamable.com/eayveh" allowfullscreen></iframe>

  <div class="overlay" onclick="window.location.href='https://qqc.bar'"></div>
</div>

</body>
</html>
